<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Django Songs{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-success"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-success" href="{% url 'index' %}"
          >🎧 Django Songs</a
        >
        <div class="navbar-nav">
          <a class="nav-link" href="{% url 'index' %}">Inicio</a>
          <a
            class="nav-link btn btn-outline-success btn-sm ms-lg-3"
            href="{% url 'canciones_crear' %}"
            >+ Nueva Canción</a
          >
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
