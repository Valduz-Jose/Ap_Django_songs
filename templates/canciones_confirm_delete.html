{% extends 'base.html' %} {% block title %}Eliminar Canción | Django Songs
{%endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card shadow border-danger">
      <div class="card-body p-5">
        <h1 class="display-1 text-danger">⚠️</h1>
        <h3 class="mb-4">¿Estás seguro?</h3>
        <p class="text-muted">
          Estás a punto de eliminar <strong>"{{ cancion.titulo }}"</strong> de
          <strong>{{ cancion.artista }}</strong>. Esta acción no se puede
          deshacer.
        </p>

        <form method="post" class="mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg px-5">
            Sí, Eliminar
          </button>
          <a
            href="{% url 'index' %}"
            class="btn btn-outline-secondary btn-lg px-5"
            >Cancelar</a
          >
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
