<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django Songs | Mi Catálogo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-success fw-bold">🎧 Django Songs</h1>
        <span class="badge bg-success">Registros: {{ canciones|length }}</span>
      </div>

      <div class="card shadow">
        <div class="card-body">
          <table class="table table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Artista</th>
                <th>Popularidad</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody>
              {% for cancion in canciones %}
              <tr>
                <td>{{ cancion.id }}</td>
                <td class="fw-bold">{{ cancion.titulo }}</td>
                <td>{{ cancion.artista }}</td>
                <td>
                  <span class="badge bg-warning text-dark"
                    >{{ cancion.popularidad }} / 10</span
                  >
                </td>
                <td class="text-center">
                  <button class="btn btn-sm btn-outline-info">Editar</button>
                  <button class="btn btn-sm btn-outline-danger">
                    Eliminar
                  </button>
                </td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="5" class="text-center text-muted">
                  No hay canciones registradas todavía.
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
